<aside class="sidebar">

  <div class="sidebar__brand">
    <div class="sidebar__logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12h4l2 6 4-14 2 8h6" />
      </svg>
    </div>
    <div class="sidebar__brand-text">
      <span class="sidebar__name">QueryPulse</span>
      <span class="sidebar__tag">Monitoring Suite</span>
    </div>
  </div>

  <nav class="sidebar__nav">
    <p class="sidebar__group">Overview</p>

    <a routerLink="/admin-dashboard" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="9" rx="1" />
        <rect x="14" y="3" width="7" height="5" rx="1" />
        <rect x="14" y="12" width="7" height="9" rx="1" />
        <rect x="3" y="16" width="7" height="5" rx="1" />
      </svg>
      <span>Dashboard</span>
    </a>

    <p class="sidebar__group">Infrastructure</p>

    <a routerLink="/database-management" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="12" cy="5" rx="8" ry="3" />
        <path d="M4 5v6c0 1.66 3.58 3 8 3s8-1.34 8-3V5" />
        <path d="M4 11v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6" />
      </svg>
      <span>Databases</span>
    </a>

    <p class="sidebar__group">Monitoring</p>

    <a routerLink="/alerts" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
        <line x1="12" y1="9" x2="12" y2="13" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
      <span>Alerts</span>
    </a>
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__user">
      <div class="sidebar__avatar">QP</div>
      <div class="sidebar__user-meta">
        <span class="sidebar__user-name">{{ roleLabel }}</span>
        <span class="sidebar__user-role">{{ role }}</span>
      </div>
    </div>
    <button class="sidebar__logout" (click)="logout()" title="Sign out">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      <span>Sign out</span>
    </button>
  </div>

</aside>
