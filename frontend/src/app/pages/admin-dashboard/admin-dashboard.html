<div class="dashboard-container">

  <h1 class="dashboard-title">Pending User Approvals</h1>

  <div *ngIf="isLoading" class="empty-message">
    Loading pending users...
  </div>

  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <div *ngIf="!isLoading && !errorMessage && pendingUsers.length === 0"
       class="empty-message">
    No pending users to approve.
  </div>

  <div class="users-container"
       *ngIf="!isLoading && pendingUsers.length > 0">

    <div class="user-card"
         *ngFor="let user of pendingUsers">

      <h2>{{ user.firstName }} {{ user.lastName }}</h2>
      <p>{{ user.email }}</p>
      <p>{{ user.username }}</p>

      <button class="approve-btn"
              (click)="approveUser(user.id)">
        Approve
      </button>

    </div>

  </div>

</div>
