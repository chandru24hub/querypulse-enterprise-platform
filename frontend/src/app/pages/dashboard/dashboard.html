<!-- PENDING USERS -->

<div class="pending-users-section">

    <h2>
        Pending User Approvals
    </h2>

    <table>

        <thead>

            <tr>

                <th>
                    First Name
                </th>

                <th>
                    Last Name
                </th>

                <th>
                    Email
                </th>

                <th>
                    Username
                </th>

                <th>
                    Action
                </th>

            </tr>

        </thead>

        <tbody>

            <tr
                *ngFor="
                    let user
                    of pendingUsers
                "
            >

                <td>
                    {{ user.firstName }}
                </td>

                <td>
                    {{ user.lastName }}
                </td>

                <td>
                    {{ user.email }}
                </td>

                <td>
                    {{ user.username }}
                </td>

                <td>

                    <button
                        class="approve-btn"
                        (click)="approveUser(user.id)"
                    >

                        Approve

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>
