spring.application.name=querypulse-backend

# ===============================
# DATABASE CONFIGURATION
# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5433/querypulse
spring.datasource.username=postgres
spring.datasource.password=admin@123

spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA CONFIGURATION
# ===============================

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# SERVER CONFIGURATION
# ===============================

server.port=8080

# ===============================
# LOGGING
# ===============================

logging.level.org.springframework.security=DEBUG

# ===============================
# JWT CONFIGURATION
# ===============================

jwt.secret=QueryPulseSecretKeyQueryPulseSecretKey123456789
jwt.expiration=86400000

# ===============================
# EMAIL CONFIGURATION
# ===============================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===============================
# ANTHROPIC API CONFIGURATION
# ===============================

anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.url=https://api.anthropic.com/v1/messages